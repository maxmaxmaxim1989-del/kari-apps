<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="КОРМ">
<title>КОРМ — Проверка магазина</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

:root {
  --red:#C0001A; --bg:#F0F1F3; --panel:#fff;
  --border:#E2E4E8; --text:#1A1A2E; --muted:#888; --sub:#555;
  --green:#1B7A3E; --green-bg:#E8F5EE;
  --amber:#B45309; --amber-bg:#FEF3C7;
  --red-bg:#FEE2E2; --blue:#1D4ED8; --blue-bg:#EFF6FF;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding-bottom:80px;}

/* HEADER */
.hdr{background:var(--panel);border-bottom:3px solid var(--red);padding:12px 16px;position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--red);letter-spacing:3px;}
.logo-sub{font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.back-btn{background:none;border:1px solid var(--border);padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;color:var(--sub);display:none;}

/* SCREENS */
.screen{display:none;}.screen.active{display:block;}
.container{padding:14px;max-width:600px;margin:0 auto;}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);padding:14px;margin-bottom:10px;}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--red);margin-bottom:10px;}
.card-title span{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;font-weight:400;}

/* SHOP LIST */
.shop-item{display:flex;align-items:center;padding:11px 12px;background:var(--panel);border:1px solid var(--border);margin-bottom:6px;cursor:pointer;transition:all .12s;}
.shop-item:active{background:#FFF5F5;border-color:var(--red);}
.shop-dot{width:8px;height:8px;border-radius:50%;background:var(--border);margin-right:10px;flex-shrink:0;}
.shop-dot.done{background:var(--green);}
.shop-dot.partial{background:var(--amber);}
.shop-info{flex:1;}
.shop-name{font-size:13px;font-weight:600;}
.shop-meta{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);margin-top:2px;}
.shop-arr{color:var(--muted);font-size:18px;}

/* PROGRESS */
.progress-wrap{margin-top:4px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;}
.progress-fill{height:100%;border-radius:2px;transition:width .3s;}

/* CHECK ITEMS */
.check-section{margin-bottom:14px;}
.check-section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;padding:6px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;justify-content:space-between;}
.check-weight{color:var(--red);}

.check-item{background:var(--panel);border:1px solid var(--border);padding:11px 12px;margin-bottom:6px;}
.check-top{display:flex;align-items:flex-start;gap:10px;}
.check-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);min-width:20px;margin-top:1px;}
.check-text{flex:1;font-size:13px;line-height:1.4;}
.check-desc{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.4;}

/* STATUS BUTTONS */
.check-btns{display:flex;gap:6px;margin-top:10px;}
.cbtn{flex:1;padding:8px 4px;border:1.5px solid var(--border);background:none;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;text-align:center;transition:all .12s;letter-spacing:.5px;}
.cbtn:active{transform:scale(.97);}
.cbtn.ok{border-color:#86EFAC;background:var(--green-bg);color:var(--green);}
.cbtn.bad{border-color:#FCA5A5;background:var(--red-bg);color:var(--red);}
.cbtn.skip{border-color:var(--border);background:#F9F9F9;color:var(--muted);}

/* ЗАМЕЧАНИЕ ФОРМА */
.remark-form{margin-top:10px;padding:10px;background:#FFF5F5;border:1px solid #FCA5A5;display:none;}
.remark-form.open{display:block;}
.form-label{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
.form-input{width:100%;border:1px solid var(--border);background:#fff;padding:8px 10px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;outline:none;margin-bottom:8px;color:var(--text);}
.form-input:focus{border-color:var(--red);}
textarea.form-input{min-height:70px;resize:vertical;}
.photo-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.photo-thumb{width:60px;height:60px;border:1px solid var(--border);object-fit:cover;cursor:pointer;position:relative;}
.photo-add{width:60px;height:60px;border:1.5px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;background:#fafafa;color:var(--muted);}
.photo-add:active{background:#FFF5F5;border-color:var(--red);}
.photo-input{display:none;}

/* TAGS */
.tag{display:inline-block;padding:3px 7px;font-size:10px;font-family:'IBM Plex Mono',monospace;border-radius:2px;margin:2px 2px 2px 0;}
.tag-ok{background:var(--green-bg);color:var(--green);border:1px solid #86EFAC;}
.tag-bad{background:var(--red-bg);color:var(--red);border:1px solid #FCA5A5;}
.tag-skip{background:#F3F4F6;color:var(--muted);border:1px solid var(--border);}
.tag-photo{background:var(--blue-bg);color:var(--blue);border:1px solid #BFDBFE;}
.tag-date{background:var(--amber-bg);color:var(--amber);border:1px solid #FCD34D;}

/* SCORE */
.score-big{font-family:'Bebas Neue',sans-serif;font-size:56px;line-height:1;letter-spacing:2px;}
.score-wrap{text-align:center;padding:20px 0 14px;}
.score-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--bg);padding:10px 12px;}
.stat-val{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;}
.stat-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:2px;}
.stat-val.green{color:var(--green);}
.stat-val.red{color:var(--red);}
.stat-val.amber{color:var(--amber);}

/* BUTTONS */
.btn{background:var(--red);color:#fff;border:none;padding:13px 20px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;width:100%;margin-top:8px;transition:all .12s;}
.btn:active{background:#A00015;transform:scale(.98);}
.btn.green{background:var(--green);}
.btn.outline{background:transparent;color:var(--text);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* DIVIDER */
.div{height:1px;background:var(--border);margin:12px 0;}

/* SUMMARY ITEM */
.sum-item{padding:8px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.sum-item:last-child{border-bottom:none;}
.sum-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);min-width:20px;}
.sum-text{flex:1;font-size:12px;}
.sum-status{font-size:11px;font-family:'IBM Plex Mono',monospace;}

/* PDF PREVIEW */
.pdf-preview{background:#fff;border:1px solid var(--border);padding:16px;font-size:12px;line-height:1.6;}
.pdf-hdr{background:#1A1A2E;color:#fff;padding:12px 16px;margin:-16px -16px 14px;}
.pdf-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;}
.pdf-meta{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8888BB;margin-top:2px;}
.pdf-block{margin-bottom:12px;}
.pdf-block-title{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:4px;margin-bottom:8px;}
.pdf-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.pdf-photo-wrap{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.pdf-photo-img{width:50px;height:50px;object-fit:cover;border:0.5px solid var(--border);}
.pdf-comment{font-size:11px;color:var(--sub);margin-top:3px;font-style:italic;}
.pdf-deadline{display:inline-block;font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--amber);background:var(--amber-bg);padding:2px 6px;margin-top:3px;}
.pdf-score-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--border);}
.pdf-score-name{font-size:12px;}
.pdf-score-val{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;}
.pdf-total{background:#1A1A2E;color:#fff;padding:10px 14px;margin:10px -16px -16px;display:flex;justify-content:space-between;align-items:center;}
.pdf-total-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#8888BB;letter-spacing:1px;}
.pdf-total-val{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;}

/* WARN/OK BOXES */
.warn-box{background:var(--amber-bg);border:1px solid #FCD34D;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--amber);}
.ok-box{background:var(--green-bg);border:1px solid #86EFAC;padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--green);}

/* STICKY FOOTER */
.sticky-footer{position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);padding:10px 16px;z-index:99;display:none;}
.sticky-footer.show{display:block;}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="logo">КОРМ</div>
    <div class="logo-sub">Оценка магазина</div>
  </div>
  <div class="hdr-right">
    <button class="back-btn" id="back-btn" onclick="goBack()">← Назад</button>
    <div id="hdr-info" style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);"></div>
  </div>
</header>

<!-- ЭКРАН 1: СПИСОК МАГАЗИНОВ -->
<div class="screen active" id="screen-shops">
  <div class="container">
    <div style="margin:4px 0 12px;">
      <input type="text" id="shop-search" placeholder="Поиск магазина..." style="width:100%;border:1px solid var(--border);padding:9px 12px;font-family:'IBM Plex Mono',monospace;font-size:12px;outline:none;background:var(--panel);" oninput="filterShops(this.value)">
    </div>
    <div id="shops-list"></div>
    <button class="btn outline" onclick="addShop()" style="margin-top:4px;">+ Добавить магазин</button>
  </div>
</div>

<!-- ЭКРАН 2: ЧЕКЛИСТ -->
<div class="screen" id="screen-check">
  <div class="container" id="check-container"></div>
  <div class="sticky-footer show" id="check-footer">
    <button class="btn" onclick="goToSummary()">Готово → Итоги проверки</button>
  </div>
</div>

<!-- ЭКРАН 3: ИТОГИ + PDF -->
<div class="screen" id="screen-summary">
  <div class="container" id="summary-container"></div>
</div>

<script>
// ─── ДАННЫЕ КОРМ ─────────────────────────────────────────────────────────────
const KORM_ITEMS = [
  { id:1, title:'Мерчендайзинг и акции', weight:0.15,
    desc:'Соответствие выкладки бюллетеню, актуальность акций, наличие ценников на всех товарах.' },
  { id:2, title:'Знание планов и показателей', weight:0.10,
    desc:'Директор и сотрудники знают KPI, рейтинг магазина, планы по выручке, среднему чеку, конверсии.' },
  { id:3, title:'Мотивация и доход сотрудников', weight:0.10,
    desc:'Знание мотивационных схем, уровень зарплат, работа с целями. Активность в продажах.' },
  { id:4, title:'Чистота и порядок', weight:0.10,
    desc:'Торговый зал, оборудование, подсобные помещения. Коробки с крышками, рожки и следки у пуфов.' },
  { id:5, title:'Безопасность и защита товара', weight:0.10,
    desc:'Наличие защиты на кожаной обуви и аксессуарах. Работоспособность рамок.' },
  { id:6, title:'Переоценка и ценники', weight:0.10,
    desc:'На каждом товаре есть ценник, переоценка актуальна. Нет отсутствующих или неверных ценников.' },
  { id:7, title:'Рабочие процессы', weight:0.15,
    desc:'Знание процессов: приёмка товара, вывоз заказов, выкладка. Нет задержек и ошибок подготовки.' },
  { id:8, title:'Продажи и сервис', weight:0.10,
    desc:'Работа кассы, отдел ЮИ, кожаная обувь. Контакты с клиентами, знание мотивации.' },
  { id:9, title:'Оборудование и реклама', weight:0.05,
    desc:'Состояние оборудования, работа рекламных материалов, своевременность ремонта.' },
  { id:10, title:'Обучение сотрудников', weight:0.05,
    desc:'Все прошли обязательные курсы, знание последних обновлений.' },
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let shops = JSON.parse(localStorage.getItem('korm_shops') || '[]');
let currentShop = null;
let checks = {}; // { itemId: { status: 'ok'|'bad'|'skip'|null, comment:'', deadline:'', photos:[] } }
let currentScreen = 'shops';

if (!shops.length) {
  shops = [
    { id:'10105', name:'Ставрополь, ТЦ Обувь Сити', checks:[] },
    { id:'10187', name:'Нальчик, ТРЦ Дея', checks:[] },
    { id:'10401', name:'Нальчик, ЦУМ', checks:[] },
    { id:'10557', name:'Георгиевск, ТЦ Россия', checks:[] },
    { id:'10595', name:'Владикавказ, ЦУМ', checks:[] },
    { id:'10640', name:'Махачкала, ТЦ Седьмой континент', checks:[] },
    { id:'10816', name:'Ставрополь, ТЦ Европейский-2', checks:[] },
    { id:'10879', name:'Ставрополь, ТРЦ Европейский', checks:[] },
    { id:'10888', name:'Ставрополь, ТРЦ Москва', checks:[] },
    { id:'10956', name:'Каспийск, ТЦ Ривьера', checks:[] },
    { id:'10985', name:'Ставрополь, ТРЦ Мегацентр Kosmos', checks:[] },
    { id:'11047', name:'Махачкала, ТЦ', checks:[] },
    { id:'11259', name:'Буденновск, ул. Октябрьская д.64А', checks:[] },
    { id:'11428', name:'Владикавказ, ТЦ Алания Молл', checks:[] },
    { id:'11430', name:'Грозный, ТРЦ Грозный Молл', checks:[] },
    { id:'11498', name:'Невинномысск, Гагарина ул., д. 63', checks:[] },
    { id:'11532', name:'Назрань, ТЦ АлифМолл', checks:[] },
    { id:'11869', name:'Владикавказ, ТЦ Столица', checks:[] },
    { id:'11903', name:'Михайловск, Ленина ул., д. 87', checks:[] },
    { id:'13111', name:'Прохладный, ТЦ', checks:[] },
    { id:'13130', name:'Невинномысск, ТЦ', checks:[] },
    { id:'13154', name:'Махачкала, ТРЦ Миркато', checks:[] },
    { id:'13167', name:'Ставрополь, ТЦ Солнечный', checks:[] },
    { id:'13194', name:'Ставрополь, ТРЦ Космос', checks:[] },
  ];
  saveShops();
}

function saveShops() { localStorage.setItem('korm_shops', JSON.stringify(shops)); }

// ─── НАВИГАЦИЯ ────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
  document.getElementById('back-btn').style.display = name !== 'shops' ? 'block' : 'none';
  document.getElementById('check-footer').classList.toggle('show', name === 'check');
}

function goBack() {
  if (currentScreen === 'check') { showScreen('shops'); renderShops(); }
  else if (currentScreen === 'summary') showScreen('check');
}

// ─── МАГАЗИНЫ ─────────────────────────────────────────────────────────────────
function renderShops(filter) {
  const list = document.getElementById('shops-list');
  let arr = shops;
  if (filter) arr = arr.filter(s => s.name.toLowerCase().includes(filter.toLowerCase()) || s.id.includes(filter));

  list.innerHTML = arr.map(shop => {
    const lastCheck = shop.checks && shop.checks.length ? shop.checks[shop.checks.length - 1] : null;
    const done = lastCheck ? lastCheck.doneCount : 0;
    const total = KORM_ITEMS.length;
    const pct = lastCheck ? Math.round(lastCheck.score * 100) : null;
    const dotCls = pct === null ? '' : pct >= 80 ? 'done' : pct >= 60 ? 'partial' : '';
    const barColor = pct === null ? 'var(--border)' : pct >= 80 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';
    const barW = lastCheck ? Math.round((done / total) * 100) : 0;

    return `<div class="shop-item" onclick="openShop('${shop.id}')">
      <div class="shop-dot ${dotCls}"></div>
      <div class="shop-info">
        <div class="shop-name">№${shop.id} · ${shop.name}</div>
        <div class="shop-meta">${lastCheck ? `Последняя проверка: ${lastCheck.date} · ${pct}%` : 'Не проверялся'}</div>
        ${lastCheck ? `<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${barW}%;background:${barColor};"></div></div></div>` : ''}
      </div>
      <div class="shop-arr">›</div>
    </div>`;
  }).join('');
}

function filterShops(v) { renderShops(v); }

function openShop(id) {
  currentShop = shops.find(s => s.id === id);
  checks = {};
  KORM_ITEMS.forEach(item => {
    checks[item.id] = { status: null, comment: '', deadline: '', photos: [] };
  });
  document.getElementById('hdr-info').textContent = '№' + id;
  renderChecklist();
  showScreen('check');
}

function addShop() {
  const id = prompt('Номер магазина (например 10999):');
  if (!id || !id.trim()) return;
  const name = prompt('Название (например Махачкала ТЦ Луч):');
  if (!name || !name.trim()) return;
  shops.push({ id: id.trim(), name: name.trim(), checks: [] });
  saveShops();
  renderShops();
}

// ─── ЧЕКЛИСТ ──────────────────────────────────────────────────────────────────
function renderChecklist() {
  const container = document.getElementById('check-container');
  let html = `<div style="padding:4px 0 2px;">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:var(--text);">№${currentShop.id} · ${currentShop.name}</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;">${new Date().toLocaleDateString('ru-RU')} · Заполни все пункты</div>
  </div>
  <div id="progress-summary" style="margin:10px 0;"></div>`;

  KORM_ITEMS.forEach(item => {
    html += `<div class="card" id="card-${item.id}">
      <div class="check-top">
        <div class="check-num">${item.id}</div>
        <div style="flex:1;">
          <div class="check-text">${item.title}</div>
          <div class="check-desc">${item.desc}</div>
          <div style="margin-top:4px;"><span class="tag tag-skip">Вес ${Math.round(item.weight*100)}%</span></div>
        </div>
      </div>
      <div class="check-btns">
        <button class="cbtn" id="btn-ok-${item.id}" onclick="setStatus(${item.id},'ok')">✓ Ок</button>
        <button class="cbtn" id="btn-bad-${item.id}" onclick="setStatus(${item.id},'bad')">! Замечание</button>
        <button class="cbtn" id="btn-skip-${item.id}" onclick="setStatus(${item.id},'skip')">— Н/П</button>
      </div>
      <div class="remark-form" id="remark-${item.id}">
        <div class="form-label">Комментарий</div>
        <textarea class="form-input" id="comment-${item.id}" placeholder="Опиши нарушение подробно..." onchange="saveComment(${item.id})"></textarea>
        <div class="form-label">Срок исправления</div>
        <input type="date" class="form-input" id="deadline-${item.id}" onchange="saveDeadline(${item.id})" style="width:auto;">
        <div class="form-label" style="margin-top:8px;">Фото</div>
        <div class="photo-row" id="photos-${item.id}">
          <div class="photo-add" onclick="triggerPhoto(${item.id})">+</div>
        </div>
        <input type="file" accept="image/*" capture="environment" class="photo-input" id="photo-input-${item.id}" onchange="addPhoto(${item.id}, event)">
      </div>
    </div>`;
  });

  container.innerHTML = html;
  updateProgress();
}

function setStatus(id, status) {
  checks[id].status = status;

  ['ok','bad','skip'].forEach(s => {
    const btn = document.getElementById(`btn-${s}-${id}`);
    btn.className = 'cbtn';
    if (s === status) btn.classList.add(s);
  });

  const form = document.getElementById(`remark-${id}`);
  form.classList.toggle('open', status === 'bad');

  // Scroll to next unanswered
  updateProgress();
}

function saveComment(id) { checks[id].comment = document.getElementById(`comment-${id}`).value; }
function saveDeadline(id) { checks[id].deadline = document.getElementById(`deadline-${id}`).value; }

function triggerPhoto(id) { document.getElementById(`photo-input-${id}`).click(); }

function addPhoto(id, event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    checks[id].photos.push(e.target.result);
    renderPhotos(id);
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function renderPhotos(id) {
  const wrap = document.getElementById(`photos-${id}`);
  const photos = checks[id].photos;
  let html = photos.map((p, i) =>
    `<img src="${p}" class="photo-thumb" onclick="removePhoto(${id},${i})" title="Нажми чтобы удалить">`
  ).join('');
  html += `<div class="photo-add" onclick="triggerPhoto(${id})">+</div>`;
  wrap.innerHTML = html;
}

function removePhoto(id, idx) {
  if (!confirm('Удалить фото?')) return;
  checks[id].photos.splice(idx, 1);
  renderPhotos(id);
}

function updateProgress() {
  const answered = Object.values(checks).filter(c => c.status !== null).length;
  const total = KORM_ITEMS.length;
  const pct = Math.round((answered / total) * 100);
  const el = document.getElementById('progress-summary');
  if (!el) return;
  const barColor = pct === 100 ? 'var(--green)' : pct > 50 ? 'var(--amber)' : 'var(--red)';
  el.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);">Заполнено ${answered} из ${total} пунктов</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:${barColor};">${pct}%</div>
  </div>
  <div style="height:4px;background:var(--border);border-radius:2px;">
    <div style="height:100%;width:${pct}%;background:${barColor};border-radius:2px;transition:width .3s;"></div>
  </div>`;
}

// ─── ИТОГИ ───────────────────────────────────────────────────────────────────
function calcScore() {
  let score = 0;
  let maxScore = 0;
  KORM_ITEMS.forEach(item => {
    const c = checks[item.id];
    if (c.status === 'ok') { score += item.weight; maxScore += item.weight; }
    else if (c.status === 'bad') { maxScore += item.weight; }
    else if (c.status === 'skip') { /* не учитываем */ }
    else { maxScore += item.weight; }
  });
  return maxScore > 0 ? score / maxScore : 0;
}

function goToSummary() {
  const unanswered = Object.values(checks).filter(c => c.status === null).length;
  if (unanswered > 0) {
    if (!confirm(`Не заполнено ${unanswered} пунктов. Продолжить?`)) return;
  }
  renderSummary();
  showScreen('summary');
}

function renderSummary() {
  const score = calcScore();
  const scorePct = Math.round(score * 100);
  const scoreColor = scorePct >= 80 ? 'var(--green)' : scorePct >= 60 ? 'var(--amber)' : 'var(--red)';

  const okItems = KORM_ITEMS.filter(i => checks[i.id].status === 'ok');
  const badItems = KORM_ITEMS.filter(i => checks[i.id].status === 'bad');
  const skipItems = KORM_ITEMS.filter(i => checks[i.id].status === 'skip');
  const nullItems = KORM_ITEMS.filter(i => checks[i.id].status === null);

  let html = `<div style="padding-top:4px;">

  <div class="card">
    <div class="score-wrap">
      <div class="score-big" style="color:${scoreColor};">${scorePct}%</div>
      <div class="score-label">Итоговая оценка КОРМ</div>
      <div style="margin-top:8px;">
        ${scorePct >= 80 ? '<span class="tag tag-ok">Хорошо</span>' : scorePct >= 60 ? '<span class="tag" style="background:var(--amber-bg);color:var(--amber);border:1px solid #FCD34D;">Удовлетворительно</span>' : '<span class="tag tag-bad">Требует внимания</span>'}
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-val green">${okItems.length}</div><div class="stat-lbl">Ок</div></div>
      <div class="stat-box"><div class="stat-val red">${badItems.length}</div><div class="stat-lbl">Замечания</div></div>
      <div class="stat-box"><div class="stat-val">${skipItems.length}</div><div class="stat-lbl">Н/П</div></div>
      <div class="stat-box"><div class="stat-val amber">${nullItems.length}</div><div class="stat-lbl">Не заполнено</div></div>
    </div>
  </div>`;

  // Замечания по пунктам
  if (badItems.length) {
    html += `<div class="card">
      <div class="card-title">Замечания <span>${badItems.length} пунктов</span></div>`;
    badItems.forEach(item => {
      const c = checks[item.id];
      html += `<div class="sum-item">
        <div class="sum-num">${item.id}</div>
        <div class="sum-text">
          <div style="font-weight:600;font-size:13px;">${item.title}</div>
          ${c.comment ? `<div style="color:var(--sub);margin-top:2px;font-size:12px;">${c.comment}</div>` : ''}
          <div style="margin-top:4px;">
            ${c.deadline ? `<span class="tag tag-date">Срок: ${formatDate(c.deadline)}</span>` : '<span class="tag tag-bad">Срок не указан</span>'}
            ${c.photos.length ? `<span class="tag tag-photo">${c.photos.length} фото</span>` : ''}
          </div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  // Оценка по блокам
  html += `<div class="card">
    <div class="card-title">По блокам</div>`;
  KORM_ITEMS.forEach(item => {
    const c = checks[item.id];
    const st = c.status;
    const icon = st === 'ok' ? '✓' : st === 'bad' ? '!' : st === 'skip' ? '—' : '?';
    const col = st === 'ok' ? 'var(--green)' : st === 'bad' ? 'var(--red)' : 'var(--muted)';
    html += `<div class="pdf-score-row">
      <div class="pdf-score-name">${item.id}. ${item.title}</div>
      <div class="pdf-score-val" style="color:${col};">${icon} ${Math.round(item.weight*100)}%</div>
    </div>`;
  });
  html += `</div>`;

  // KPI блок
  html += `<div class="card">
    <div class="card-title">KPI в работу на 30 дней</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
      <input class="form-input" placeholder="KPI 1" id="kpi1" style="font-size:12px;padding:7px 8px;">
      <input class="form-input" placeholder="KPI 2" id="kpi2" style="font-size:12px;padding:7px 8px;">
      <input class="form-input" placeholder="KPI 3" id="kpi3" style="font-size:12px;padding:7px 8px;">
    </div>
    <div class="div"></div>
    <div class="form-label">Проверяющий</div>
    <input class="form-input" id="inspector" placeholder="Имя проверяющего" style="margin-bottom:8px;">
    <div class="form-label">Директор магазина</div>
    <input class="form-input" id="store-dir" placeholder="Имя директора магазина">
  </div>

  <div class="btn-row">
    <button class="btn outline" onclick="showScreen('check')">← Изменить</button>
    <button class="btn green" onclick="generateAndSave()">Сформировать PDF</button>
  </div>
  <div id="pdf-result" style="margin-top:10px;"></div>
  </div>`;

  document.getElementById('summary-container').innerHTML = html;
}

// ─── PDF ГЕНЕРАЦИЯ ────────────────────────────────────────────────────────────
function generateAndSave() {
  const score = calcScore();
  const scorePct = Math.round(score * 100);
  const badItems = KORM_ITEMS.filter(i => checks[i.id].status === 'bad');
  const okItems = KORM_ITEMS.filter(i => checks[i.id].status === 'ok');
  const inspector = document.getElementById('inspector').value || 'Директор подразделения';
  const storeDir = document.getElementById('store-dir').value || '—';
  const kpi1 = document.getElementById('kpi1').value;
  const kpi2 = document.getElementById('kpi2').value;
  const kpi3 = document.getElementById('kpi3').value;
  const dateStr = new Date().toLocaleDateString('ru-RU');
  const scoreColor = scorePct >= 80 ? '#1B7A3E' : scorePct >= 60 ? '#B45309' : '#C0001A';

  // Сохраняем в историю магазина
  const shop = shops.find(s => s.id === currentShop.id);
  if (shop) {
    if (!shop.checks) shop.checks = [];
    shop.checks.push({
      date: dateStr,
      score: score,
      doneCount: KORM_ITEMS.filter(i => checks[i.id].status !== null).length,
      badCount: badItems.length,
    });
    saveShops();
  }

  // Формируем HTML-PDF для печати
  let pdfHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    body{font-family:Arial,sans-serif;font-size:12px;color:#1A1A2E;margin:0;padding:0;}
    .hdr{background:#1A1A2E;color:#fff;padding:16px 20px;}
    .hdr-title{font-size:22px;font-weight:700;letter-spacing:2px;}
    .hdr-meta{font-size:10px;color:#8888BB;margin-top:4px;}
    .score-block{background:${scoreColor};color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;}
    .score-num{font-size:36px;font-weight:700;}
    .score-lbl{font-size:10px;opacity:.8;}
    .body{padding:16px 20px;}
    .section{margin-bottom:14px;}
    .sec-title{font-size:10px;font-weight:700;color:#C0001A;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #E2E4E8;padding-bottom:4px;margin-bottom:8px;}
    .item{margin-bottom:10px;padding-bottom:10px;border-bottom:0.5px solid #F0F0F0;}
    .item-title{font-weight:700;font-size:12px;}
    .item-comment{color:#555;font-size:11px;margin-top:3px;font-style:italic;}
    .item-deadline{display:inline-block;background:#FEF3C7;color:#B45309;font-size:10px;padding:2px 6px;margin-top:3px;border-radius:2px;}
    .photos{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
    .photos img{width:80px;height:80px;object-fit:cover;border:1px solid #E2E4E8;}
    .scores-table{width:100%;border-collapse:collapse;}
    .scores-table td{padding:5px 8px;border-bottom:0.5px solid #F0F0F0;font-size:11px;}
    .scores-table td:last-child{text-align:right;font-weight:700;}
    .kpi-row{display:flex;gap:10px;margin-top:6px;}
    .kpi-box{flex:1;background:#F0F1F3;padding:8px;text-align:center;}
    .kpi-val{font-size:13px;font-weight:700;}
    .sign-row{display:flex;gap:20px;margin-top:20px;}
    .sign-box{flex:1;border-top:1px solid #1A1A2E;padding-top:6px;font-size:10px;color:#888;}
    .footer{background:#F0F1F3;padding:8px 20px;font-size:9px;color:#888;text-align:center;margin-top:20px;}
  </style></head><body>
  <div class="hdr">
    <div class="hdr-title">КОРМ · №${currentShop.id} · ${currentShop.name}</div>
    <div class="hdr-meta">Дата проверки: ${dateStr} · Проверяющий: ${inspector}</div>
  </div>
  <div class="score-block">
    <div><div class="score-num">${scorePct}%</div><div class="score-lbl">Итоговая оценка</div></div>
    <div style="text-align:right;font-size:11px;">
      <div>✓ Ок: ${okItems.length} пунктов</div>
      <div>! Замечания: ${badItems.length} пунктов</div>
    </div>
  </div>
  <div class="body">`;

  if (badItems.length) {
    pdfHtml += `<div class="section"><div class="sec-title">Замечания и сроки исправления</div>`;
    badItems.forEach(item => {
      const c = checks[item.id];
      pdfHtml += `<div class="item">
        <div class="item-title">${item.id}. ${item.title}</div>
        ${c.comment ? `<div class="item-comment">${c.comment}</div>` : ''}
        ${c.deadline ? `<div class="item-deadline">Срок: ${formatDate(c.deadline)}</div>` : '<span style="color:#C0001A;font-size:10px;">Срок не указан!</span>'}
        ${c.photos.length ? `<div class="photos">${c.photos.map(p => `<img src="${p}">`).join('')}</div>` : ''}
      </div>`;
    });
    pdfHtml += `</div>`;
  }

  pdfHtml += `<div class="section"><div class="sec-title">Оценка по блокам</div>
    <table class="scores-table">`;
  KORM_ITEMS.forEach(item => {
    const st = checks[item.id].status;
    const icon = st === 'ok' ? '✓' : st === 'bad' ? '!' : '—';
    const col = st === 'ok' ? '#1B7A3E' : st === 'bad' ? '#C0001A' : '#888';
    pdfHtml += `<tr><td>${item.id}. ${item.title} (${Math.round(item.weight*100)}%)</td><td style="color:${col};">${icon}</td></tr>`;
  });
  pdfHtml += `</table></div>`;

  if (kpi1 || kpi2 || kpi3) {
    pdfHtml += `<div class="section"><div class="sec-title">KPI в работу на 30 дней</div>
      <div class="kpi-row">
        ${kpi1 ? `<div class="kpi-box"><div class="kpi-val">${kpi1}</div></div>` : ''}
        ${kpi2 ? `<div class="kpi-box"><div class="kpi-val">${kpi2}</div></div>` : ''}
        ${kpi3 ? `<div class="kpi-box"><div class="kpi-val">${kpi3}</div></div>` : ''}
      </div></div>`;
  }

  pdfHtml += `<div class="sign-row">
    <div class="sign-box">${inspector}<br>Проверяющий</div>
    <div class="sign-box">${storeDir}<br>Директор магазина</div>
  </div>
  </div>
  <div class="footer">КОРМ · KARI Кавказ · ${dateStr}</div>
  </body></html>`;

  // Скачиваем HTML файл (работает в Telegram Mini App)
  const blob = new Blob([pdfHtml], {type:'text/html;charset=utf-8'});
  const blobUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = blobUrl;
  a.download = 'KORM_' + currentShop.id + '_' + dateStr.replace(/\./g,'-') + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(blobUrl), 3000);

  document.getElementById('pdf-result').innerHTML = `
    <div class="ok-box">✓ Файл скачан. Открой в Файлах → Поделиться → Telegram</div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:6px;">
      Отправь файл себе в Telegram. Бот напомнит по срокам.
    </div>`;
}

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('ru-RU');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderShops();
</script>
</body>
</html>
